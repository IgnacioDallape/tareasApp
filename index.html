<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fbe8c0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mis Tareas">
<title>Mis Tareas</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --c1: #fbe8c0;
  --c2: #e8d6ae;
  --c3: #d5c39c;
  --c4: #c2b18a;
  --c5: #af9e78;
  --c5d: #9d8e6a;
  --td: #3a2e1e;
  --tm: #6b5a3e;
  --urg:  #d94040;
  --urgb: #fdf0f0;
  --urgd: #b83232;
  --pri:  #c87a0a;
  --prib: #fef6e7;
  --prid: #a86508;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 17px;
  background: var(--c1);
  color: var(--td);
  min-height: 100vh;
  overflow-x: hidden;
}

.app {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── Header ── */
header { margin-bottom: 32px; }

.hdr-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
  color: var(--td);
}

.sub {
  font-size: 16px;
  color: var(--tm);
  margin-top: 5px;
  font-weight: 400;
}

.badge {
  background: var(--c5);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
  transition: background .2s;
}
.badge.zero { background: var(--c4); }

/* ── Sync indicator ── */
.sync-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #6cc070;
  margin-left: 8px;
  vertical-align: middle;
  transition: background .3s;
}
.sync-dot.offline { background: #d94040; }
.sync-dot.syncing { background: #e8b020; animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* ── Add form ── */
.add-form {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.add-input {
  flex: 1;
  min-width: 0;
  height: 52px;
  padding: 0 18px;
  font-family: inherit;
  font-size: 17px;
  color: var(--td);
  background: #fff;
  border: 2px solid var(--c3);
  border-radius: 12px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.add-input::placeholder { color: var(--c4); }
.add-input:focus {
  border-color: var(--c5);
  box-shadow: 0 0 0 3px rgba(175,158,120,.2);
}

.add-btn {
  height: 52px;
  padding: 0 22px;
  background: var(--c5);
  color: #fff;
  font-family: inherit;
  font-size: 17px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .2s, transform .15s;
  -webkit-user-select: none;
  user-select: none;
}
.add-btn:hover { background: var(--c5d); }
.add-btn:active { transform: scale(.96); }

/* ── Priority selector ── */
.prio-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.prio-pill {
  flex: 1;
  height: 40px;
  border: 2px solid var(--c3);
  border-radius: 10px;
  background: white;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: border-color .18s, background .18s, color .18s, transform .12s;
  -webkit-user-select: none;
  user-select: none;
}
.prio-pill:hover { border-color: var(--c4); background: var(--c2); }
.prio-pill:active { transform: scale(.96); }

.prio-pill .pdot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background .18s;
}

.prio-pill[data-p="urgente"] .pdot { background: var(--c3); }
.prio-pill[data-p="urgente"]:hover .pdot { background: var(--urg); }
.prio-pill[data-p="urgente"].active {
  background: var(--urgb);
  border-color: var(--urg);
  color: var(--urgd);
}
.prio-pill[data-p="urgente"].active .pdot { background: var(--urg); }

.prio-pill[data-p="prioritaria"] .pdot { background: var(--c3); }
.prio-pill[data-p="prioritaria"]:hover .pdot { background: var(--pri); }
.prio-pill[data-p="prioritaria"].active {
  background: var(--prib);
  border-color: var(--pri);
  color: var(--prid);
}
.prio-pill[data-p="prioritaria"].active .pdot { background: var(--pri); }

.prio-pill[data-p="normal"] .pdot { background: var(--c3); }
.prio-pill[data-p="normal"].active {
  background: var(--c5);
  border-color: var(--c5);
  color: #fff;
}
.prio-pill[data-p="normal"].active .pdot { background: rgba(255,255,255,.7); }

/* ── Actions bar ── */
.act-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.sec-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--tm);
}

.clear-btn {
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  color: var(--tm);
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 8px;
  transition: color .2s, background .2s;
}
.clear-btn:hover { color: var(--td); background: var(--c2); }
.clear-btn:disabled { opacity: .35; cursor: default; pointer-events: none; }

/* ── Priority group header ── */
.prio-hdr {
  display: flex;
  align-items: center;
  gap: 9px;
  margin: 22px 0 12px;
}
.prio-hdr.first { margin-top: 0; }

.prio-hdr-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.prio-hdr-dot.urgente     { background: var(--urg); }
.prio-hdr-dot.prioritaria { background: var(--pri); }
.prio-hdr-dot.normal      { background: var(--c4); }

.prio-hdr-lbl {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
}
.prio-hdr-lbl.urgente     { color: var(--urgd); }
.prio-hdr-lbl.prioritaria { color: var(--prid); }
.prio-hdr-lbl.normal      { color: var(--tm); }

.prio-hdr-cnt {
  font-size: 12px;
  font-weight: 600;
  color: var(--tm);
  background: var(--c2);
  border: 1px solid var(--c3);
  padding: 1px 8px;
  border-radius: 10px;
}

/* ── Task list ── */
.task-list { display: flex; flex-direction: column; }

/* ── Task item ── */
.task-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--c2);
  border: 1.5px solid var(--c3);
  border-radius: 12px;
  padding: 16px 14px 16px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  cursor: pointer;
  margin-bottom: 10px;
  overflow: hidden;
  transition: background .2s, border-color .2s, opacity .2s, box-shadow .2s;
  -webkit-user-select: none;
  user-select: none;
}
.task-item:hover {
  background: var(--c3);
  border-color: var(--c4);
  box-shadow: 0 4px 14px rgba(0,0,0,.11);
}
.task-item.done { opacity: .52; }
.task-item.done:hover { opacity: .7; }

.task-item.urgente {
  border-left-width: 4px;
  border-left-color: var(--urg);
  padding-left: 16px;
}
.task-item.prioritaria {
  border-left-width: 4px;
  border-left-color: var(--pri);
  padding-left: 16px;
}

.task-item.is-new { animation: slideIn .26s ease forwards; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.task-item.is-out {
  animation: slideOut .32s ease forwards;
  pointer-events: none;
}

@keyframes slideOut {
  0%   { opacity: 1; max-height: 200px; margin-bottom: 10px; padding-top: 16px; padding-bottom: 16px; transform: translateX(0); }
  38%  { opacity: 0; transform: translateX(22px); }
  100% { opacity: 0; max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; transform: translateX(22px); }
}

.chk {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--c4);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, border-color .2s;
}
.task-item.done .chk { background: var(--c5); border-color: var(--c5); }

.chk-icon { opacity: 0; transition: opacity .2s; }
.task-item.done .chk-icon { opacity: 1; }

.txt-wrap { flex: 1; min-width: 0; }

.txt {
  font-size: 17px;
  font-weight: 500;
  color: var(--td);
  line-height: 1.45;
  word-break: break-word;
  transition: color .2s, text-decoration-color .38s;
  text-decoration-line: line-through;
  text-decoration-color: transparent;
  text-decoration-thickness: 2px;
}
.task-item.done .txt {
  color: var(--tm);
  text-decoration-color: var(--tm);
}

.del {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--c4);
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .2s, background .2s;
  line-height: 1;
}
.del:hover { color: #c0392b; background: rgba(192,57,43,.1); }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 6px 0 14px;
}
.div-line { flex: 1; height: 1px; background: var(--c3); }
.div-lbl {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--c4);
  white-space: nowrap;
}

/* ── Empty / loading state ── */
.empty {
  text-align: center;
  padding: 52px 20px 20px;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.empty-ico { font-size: 62px; display: block; margin-bottom: 18px; }
.empty-h   { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--td); }
.empty-p   { font-size: 17px; color: var(--tm); line-height: 1.5; }

.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--tm);
  font-size: 15px;
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--c3);
  border-top-color: var(--c5);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: var(--td);
  color: #fff;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  box-shadow: 0 6px 22px rgba(0,0,0,.22);
  z-index: 200;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  max-width: calc(100% - 40px);
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #c0392b; }
.toast.success { background: #3a8a4e; }

/* ── Install banner ── */
.inst-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(160px);
  background: var(--td);
  color: #fff;
  padding: 14px 18px;
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,.22);
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 420px;
  width: calc(100% - 40px);
  z-index: 100;
  transition: transform .42s cubic-bezier(.34,1.56,.64,1);
}
.inst-banner.show { transform: translateX(-50%) translateY(0); }
.ib-txt { flex: 1; font-size: 15px; line-height: 1.4; }
.ib-txt strong { display: block; font-size: 16px; margin-bottom: 2px; }
.ib-ok {
  background: var(--c5);
  color: #fff;
  border: none;
  padding: 9px 16px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .2s;
}
.ib-ok:hover { background: var(--c5d); }
.ib-x {
  background: none;
  border: none;
  color: rgba(255,255,255,.5);
  font-size: 24px;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
  padding: 0;
  transition: color .2s;
}
.ib-x:hover { color: rgba(255,255,255,.85); }

@media (max-width: 420px) {
  .prio-pill .plbl { display: none; }
  .prio-pill { gap: 0; }
  .prio-pill .pdot { width: 10px; height: 10px; }
}
@media (max-width: 380px) {
  .add-btn .btn-lbl { display: none; }
  .add-btn { padding: 0 16px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="hdr-row">
      <div>
        <h1>Mis Tareas <span class="sync-dot syncing" id="sync-dot" title="Sincronizando..."></span></h1>
        <p class="sub">Organizá tu día con claridad</p>
      </div>
      <span class="badge zero" id="badge">0 pendientes</span>
    </div>
  </header>

  <form class="add-form" id="add-form" autocomplete="off">
    <input
      id="task-input"
      class="add-input"
      type="text"
      placeholder="¿Qué querés hacer hoy?"
      maxlength="200"
      autocomplete="off"
    >
    <button type="submit" class="add-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M9 2v14M2 9h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="btn-lbl">Agregar</span>
    </button>
  </form>

  <div class="prio-bar" id="prio-bar">
    <button class="prio-pill" data-p="urgente">
      <span class="pdot"></span>
      <span class="plbl">Urgente</span>
    </button>
    <button class="prio-pill" data-p="prioritaria">
      <span class="pdot"></span>
      <span class="plbl">Prioritaria</span>
    </button>
    <button class="prio-pill active" data-p="normal">
      <span class="pdot"></span>
      <span class="plbl">Normal</span>
    </button>
  </div>

  <div class="act-bar">
    <span class="sec-label" id="sec-label">Sin tareas</span>
    <button class="clear-btn" id="clear-btn" disabled>Limpiar completadas</button>
  </div>

  <div class="task-list" id="task-list">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Cargando tus tareas...
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="inst-banner" id="inst-banner">
  <div class="ib-txt">
    <strong>Instalar app</strong>
    Agregá Mis Tareas a tu pantalla de inicio
  </div>
  <button class="ib-ok" id="ib-ok">Instalar</button>
  <button class="ib-x" id="ib-x" aria-label="Cerrar">×</button>
</div>

<script>
// ── Supabase config ───────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://zjuifhkahvbsncwnfhrv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqdWlmaGthaHZic25jd25maHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NDc0MjQsImV4cCI6MjA5NTMyMzQyNH0.ishprRCCEcrjsVRuOZ3-M17qW2s0LnRM29EuuWJApXM';
const LOCAL_KEY = 'mis-tareas-v1';
const MIGRATED_KEY = 'mis-tareas-migrated-v1';

const PRIORITIES = ['urgente', 'prioritaria', 'normal'];
const PRIO_META = {
  urgente:     { label: 'Urgente',     cls: 'urgente' },
  prioritaria: { label: 'Prioritaria', cls: 'prioritaria' },
  normal:      { label: 'Normal',      cls: 'normal' }
};

// ── State ─────────────────────────────────────────────────────────────────────
let db = null;
let tasks = [];
let deferredPrompt = null;
let newId = null;
let currentPrio = 'normal';
let loaded = false;

// ── Sync indicator ────────────────────────────────────────────────────────────
function setSync(state) {
  const dot = document.getElementById('sync-dot');
  dot.classList.remove('syncing', 'offline');
  if (state === 'syncing') { dot.classList.add('syncing'); dot.title = 'Sincronizando...'; }
  else if (state === 'offline') { dot.classList.add('offline'); dot.title = 'Sin conexión a la nube'; }
  else { dot.title = 'Sincronizado'; }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Local backup ──────────────────────────────────────────────────────────────
function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LOCAL_KEY)) || []; }
  catch { return []; }
}

function saveLocal() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(tasks));
}

// ── Supabase data ─────────────────────────────────────────────────────────────
async function fetchTasks() {
  if (!db) return null;
  const { data, error } = await db
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) throw error;
  return (data || []).map(t => ({
    ...t,
    priority: t.priority || 'normal'
  }));
}

async function migrateLocal() {
  if (!db) return 0;
  if (localStorage.getItem(MIGRATED_KEY) === 'true') return 0;

  const local = loadLocal();
  if (local.length === 0) {
    localStorage.setItem(MIGRATED_KEY, 'true');
    return 0;
  }

  const existingIds = new Set(tasks.map(t => t.id));
  const toMigrate = local
    .filter(t => !existingIds.has(t.id))
    .map(t => ({
      id: t.id,
      text: t.text,
      done: !!t.done,
      priority: t.priority || 'normal',
      created_at: new Date(t.created || t.id || Date.now()).toISOString()
    }));

  if (toMigrate.length === 0) {
    localStorage.setItem(MIGRATED_KEY, 'true');
    return 0;
  }

  const { error } = await db.from('tasks').insert(toMigrate);
  if (error) throw error;

  // Mergear al estado local
  tasks = [...toMigrate, ...tasks].sort((a, b) => {
    const ta = new Date(a.created_at).getTime();
    const tb = new Date(b.created_at).getTime();
    return tb - ta;
  });

  localStorage.setItem(MIGRATED_KEY, 'true');
  return toMigrate.length;
}

async function loadData() {
  setSync('syncing');
  try {
    if (!db) throw new Error('Supabase no inicializado');

    const fetched = await fetchTasks();
    tasks = fetched;

    // Migración: subir tareas viejas de localStorage si no se hizo antes
    const migrated = await migrateLocal();
    if (migrated > 0) {
      toast(`${migrated} tarea${migrated !== 1 ? 's' : ''} migrada${migrated !== 1 ? 's' : ''} a la nube`, 'success');
    }

    saveLocal();
    setSync('ok');
  } catch (e) {
    console.warn('Load failed, usando localStorage', e);
    tasks = loadLocal();
    tasks.forEach(t => { if (!t.priority) t.priority = 'normal'; });
    setSync('offline');
    toast('Sin conexión — usando datos locales', 'error');
  }
  loaded = true;
}

// ── Actions (con optimistic updates) ──────────────────────────────────────────
async function addTask(text) {
  text = text.trim();
  if (!text) return false;

  const id = Date.now();
  newId = id;
  const task = {
    id,
    text,
    done: false,
    priority: currentPrio,
    created_at: new Date().toISOString()
  };

  // Optimistic
  tasks.unshift(task);
  saveLocal();
  render();
  newId = null;

  if (!db) return true;
  setSync('syncing');
  try {
    const { error } = await db.from('tasks').insert([task]);
    if (error) throw error;
    setSync('ok');
  } catch (e) {
    console.warn('Add failed', e);
    setSync('offline');
    toast('No se pudo guardar en la nube', 'error');
  }
  return true;
}

async function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  saveLocal();
  render();

  if (!db) return;
  setSync('syncing');
  try {
    const { error } = await db.from('tasks').update({ done: t.done }).eq('id', id);
    if (error) throw error;
    setSync('ok');
  } catch (e) {
    console.warn('Toggle failed', e);
    setSync('offline');
  }
}

async function deleteTaskRemote(id) {
  if (!db) return;
  setSync('syncing');
  try {
    const { error } = await db.from('tasks').delete().eq('id', id);
    if (error) throw error;
    setSync('ok');
  } catch (e) {
    console.warn('Delete failed', e);
    setSync('offline');
  }
}

async function clearCompleted() {
  const list = document.getElementById('task-list');
  const doneEls = Array.from(list.querySelectorAll('.task-item.done'));
  const doneIds = tasks.filter(t => t.done).map(t => t.id);

  if (!doneEls.length) {
    tasks = tasks.filter(t => !t.done);
    saveLocal(); render();
    return;
  }

  let remaining = doneEls.length;
  doneEls.forEach(el => {
    animateOut(el, () => {
      if (--remaining === 0) {
        tasks = tasks.filter(t => !t.done);
        saveLocal(); render();
      }
    });
  });

  if (!db || doneIds.length === 0) return;
  setSync('syncing');
  try {
    const { error } = await db.from('tasks').delete().in('id', doneIds);
    if (error) throw error;
    setSync('ok');
  } catch (e) {
    console.warn('Clear failed', e);
    setSync('offline');
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function animateOut(el, cb) {
  el.classList.add('is-out');
  let called = false;
  const finish = () => { if (called) return; called = true; cb(); };
  el.addEventListener('animationend', finish, { once: true });
  setTimeout(finish, 450);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const pending = tasks.filter(t => !t.done);
  const done    = tasks.filter(t =>  t.done);

  const p = pending.length;
  const badge = document.getElementById('badge');
  badge.textContent = p === 1 ? '1 pendiente' : `${p} pendientes`;
  badge.classList.toggle('zero', p === 0);

  document.getElementById('clear-btn').disabled = done.length === 0;

  const total = tasks.length;
  document.getElementById('sec-label').textContent =
    total === 0 ? 'Sin tareas' : total === 1 ? '1 tarea' : `${total} tareas`;

  const list = document.getElementById('task-list');
  list.innerHTML = '';

  if (!loaded) {
    list.innerHTML = `<div class="loading"><div class="spinner"></div>Cargando tus tareas...</div>`;
    return;
  }

  if (tasks.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <span class="empty-ico">✅</span>
        <p class="empty-h">¡Todo en orden!</p>
        <p class="empty-p">Escribí una tarea arriba<br>para empezar tu día</p>
      </div>`;
    return;
  }

  const activeGroups = PRIORITIES.filter(pr => tasks.some(t => t.priority === pr));
  const showHeaders = activeGroups.length > 1;
  let isFirst = true;

  activeGroups.forEach(prio => {
    const prioTasks = tasks.filter(t => t.priority === prio);
    const prPending = prioTasks.filter(t => !t.done);
    const prDone    = prioTasks.filter(t =>  t.done);

    if (showHeaders) {
      list.appendChild(makePrioHeader(prio, prPending.length, isFirst));
      isFirst = false;
    }

    prPending.forEach(t => list.appendChild(makeItem(t)));

    if (prPending.length > 0 && prDone.length > 0) {
      list.appendChild(makeDivider());
    }

    prDone.forEach(t => list.appendChild(makeItem(t)));
  });
}

function makePrioHeader(prio, pendingCount, isFirst) {
  const meta = PRIO_META[prio];
  const el = document.createElement('div');
  el.className = `prio-hdr${isFirst ? ' first' : ''}`;
  el.innerHTML = `
    <span class="prio-hdr-dot ${meta.cls}"></span>
    <span class="prio-hdr-lbl ${meta.cls}">${meta.label}</span>
    ${pendingCount > 0 ? `<span class="prio-hdr-cnt">${pendingCount} pendiente${pendingCount !== 1 ? 's' : ''}</span>` : ''}`;
  return el;
}

function makeDivider() {
  const el = document.createElement('div');
  el.className = 'divider';
  el.innerHTML = `<div class="div-line"></div><span class="div-lbl">Completadas</span><div class="div-line"></div>`;
  return el;
}

function makeItem(task) {
  const el = document.createElement('div');
  el.className = [
    'task-item',
    task.priority !== 'normal' ? task.priority : '',
    task.done ? 'done' : '',
    task.id === newId ? 'is-new' : ''
  ].filter(Boolean).join(' ');
  el.dataset.id = task.id;

  el.innerHTML = `
    <div class="chk" aria-hidden="true">
      <svg class="chk-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
        <polyline points="2,6.5 5,10 11,3"
          stroke="#fff" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="txt-wrap">
      <span class="txt">${esc(task.text)}</span>
    </div>
    <button class="del" title="Eliminar tarea" aria-label="Eliminar">✕</button>`;

  el.addEventListener('click', e => {
    if (e.target.closest('.del')) return;
    toggleTask(task.id);
  });

  el.querySelector('.del').addEventListener('click', e => {
    e.stopPropagation();
    animateOut(el, () => {
      tasks = tasks.filter(t => t.id !== task.id);
      saveLocal(); render();
      deleteTaskRemote(task.id);
    });
  });

  return el;
}

// ── Priority selector ─────────────────────────────────────────────────────────
document.querySelectorAll('.prio-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPrio = btn.dataset.p;
    document.querySelectorAll('.prio-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('task-input').focus();
  });
});

// ── Form ──────────────────────────────────────────────────────────────────────
document.getElementById('add-form').addEventListener('submit', e => {
  e.preventDefault();
  const inp = document.getElementById('task-input');
  const txt = inp.value;
  if (!txt.trim()) return;
  inp.value = '';
  addTask(txt);
  inp.focus();
});

document.getElementById('clear-btn').addEventListener('click', clearCompleted);

// ── PWA: Service Worker ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── PWA: Install prompt ───────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => document.getElementById('inst-banner').classList.add('show'), 2500);
});

document.getElementById('ib-ok').addEventListener('click', () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('inst-banner').classList.remove('show');
  });
});

document.getElementById('ib-x').addEventListener('click', () => {
  document.getElementById('inst-banner').classList.remove('show');
});

// ── Online/offline detection ──────────────────────────────────────────────────
window.addEventListener('online', async () => {
  toast('Conexión recuperada', 'success');
  await loadData();
  render();
});
window.addEventListener('offline', () => {
  setSync('offline');
  toast('Sin conexión', 'error');
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Inicializar Supabase
  if (window.supabase) {
    try {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
      console.warn('Supabase init failed', e);
    }
  }

  // Mostrar datos locales rápido mientras carga
  tasks = loadLocal();
  tasks.forEach(t => { if (!t.priority) t.priority = 'normal'; });
  if (tasks.length > 0) {
    loaded = true;
    render();
  }

  // Cargar desde Supabase (sobrescribe el estado local)
  await loadData();
  render();
}

init();
</script>
